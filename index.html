<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="KPI Dashboard - Operations Analytics & Incident Tracking for Telecom Network" />
  <title>KPI Dashboard — Operations Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <script>
    (function () {
      const cookies = document.cookie || '';
      const getCookie = (name) => {
        const match = cookies.match(new RegExp('(?:^|; )' + name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '=([^;]*)'));
        return match ? decodeURIComponent(match[1]) : '';
      };
      const collapsed = getCookie('kpi-sidebar-collapsed') === '1';
      const theme = getCookie('kpi-theme');
      if (theme === 'light') {
        document.body.classList.add('theme-light');
      }
      if (collapsed && !window.matchMedia('(max-width: 768px)').matches) {
        document.body.classList.add('sidebar-collapsed');
      }
    })();
  </script>
  <div class="sidebar-backdrop" id="sidebar-backdrop" aria-hidden="true"></div>
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="m7 16 4-8 4 4 4-8"/></svg>
      </div>
      <span class="brand-text">KPI Analytics</span>
      <button type="button" class="sidebar-collapse-toggle" id="sidebar-collapse-toggle" aria-label="Collapse sidebar" title="Collapse sidebar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.1" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline class="sidebar-collapse-arrow" points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>
      <button type="button" class="sidebar-close" id="sidebar-close" aria-label="Close menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" data-tab="dashboard" id="nav-dashboard">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        <span>Dashboard</span>
      </button>
      <button class="nav-item" data-tab="branch" id="nav-branch">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>
        <span>Branch KPI</span>
      </button>
      <button class="nav-item" data-tab="support" id="nav-support">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v18"/><path d="M3 12h18"/><path d="m5 5 14 14"/><path d="m19 5-14 14"/></svg>
        <span>Support KPI</span>
      </button>
      <button class="nav-item" data-tab="team" id="nav-team">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span>Team Performance</span>
      </button>
      <div class="sidebar-settings" id="sidebar-settings">
        <button class="nav-item nav-settings-toggle" id="sidebar-settings-toggle" type="button" aria-expanded="false" aria-controls="sidebar-settings-panel">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33h.01A1.65 1.65 0 0 0 9.93 3.1V3a2 2 0 0 1 4 0v.09c0 .66.39 1.26 1 1.51.59.24 1.27.11 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06c-.45.45-.57 1.13-.33 1.72v.11c.25.61.85 1 1.51 1H21a2 2 0 0 1 0 4h-.09c-.66 0-1.26.39-1.51 1z"/></svg>
          <span>Settings</span>
          <svg class="settings-menu-chevron" width="12" height="12" viewBox="0 0 10 6" aria-hidden="true"><path d="M1 1l4 4 4-4" stroke="currentColor" fill="none" stroke-width="1.5"/></svg>
        </button>
        <div class="sidebar-settings-panel" id="sidebar-settings-panel" hidden>
          <label class="settings-toggle-row" for="settings-compare-toggle">
            <span>Show comparison information</span>
            <span class="ui-switch">
              <input type="checkbox" id="settings-compare-toggle" />
              <span class="ui-switch-track" aria-hidden="true"><span class="ui-switch-thumb"></span></span>
            </span>
          </label>
        </div>
      </div>
    </nav>
    <div class="sidebar-footer">
      <div class="upload-area" id="upload-area">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span>Import Excel</span>
        <input type="file" id="file-input" accept=".xlsx,.xls,.csv" hidden />
      </div>
      <button class="export-btn" id="export-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        <span>Export</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content" id="main-content">
    <!-- Header -->
    <header class="top-header" id="top-header">
      <div class="header-left">
        <button class="menu-toggle" id="menu-toggle">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="page-title" id="page-title">Dashboard</h1>
      </div>
      <div class="header-right">
        <span class="auth-user-pill" id="auth-user-pill" hidden></span>
        <button class="toolbar-btn" id="auth-logout-btn" type="button" hidden>Logout</button>
        <div class="compare-details-anchor" id="compare-details-anchor" hidden>
          <button type="button" class="compare-details-btn" id="compare-details-btn" aria-expanded="false" aria-controls="compare-context">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
          </button>
          <div class="compare-context compare-context-dropdown" id="compare-context" role="region" aria-label="Comparison date ranges" hidden></div>
        </div>
        <div class="date-filter-group" id="date-filter-group">
          <select class="filter-select filter-select--modern" id="filter-date-mode" aria-label="Date filter mode">
            <option value="overall">Overall</option>
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="monthly">Monthly</option>
            <option value="custom">Custom Range</option>
          </select>
          <div class="calendar-system-toggle" role="group" aria-label="Calendar display">
            <button type="button" class="calendar-system-btn" id="calendar-system-en" title="Gregorian calendar">English</button>
            <button type="button" class="calendar-system-btn" id="calendar-system-ne" title="Bikram Sambat">नेपाली</button>
          </div>
          <input type="hidden" id="filter-date-anchor" value="" />
          <div class="calendar-filter-wrap" id="daily-filter-wrap">
            <div class="week-picker-shell">
              <button type="button" class="week-picker-trigger" id="daily-picker-trigger" aria-expanded="false" aria-haspopup="dialog" aria-controls="shared-calendar-popover" title="Select date">
                <span class="picker-trigger-icon-wrap" aria-hidden="true"><svg class="picker-trigger-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/><path d="M16 2v4M8 2v4M3 10h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span>
                <span class="week-picker-trigger-text" id="daily-picker-trigger-text">—</span>
                <svg class="picker-trigger-chevron" width="12" height="12" viewBox="0 0 10 6" aria-hidden="true"><path d="M1 1l4 4 4-4" stroke="currentColor" fill="none" stroke-width="1.5"/></svg>
              </button>
            </div>
          </div>
          <div class="week-filter-wrap" id="week-filter-wrap">
            <input type="hidden" id="filter-date-week" value="" />
            <div class="week-picker-shell">
              <button type="button" class="week-picker-trigger" id="week-picker-trigger" aria-expanded="false" aria-haspopup="dialog" aria-controls="shared-calendar-popover" title="Week is Sunday through Saturday">
                <span class="picker-trigger-icon-wrap" aria-hidden="true"><svg class="picker-trigger-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/><path d="M16 2v4M8 2v4M3 10h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span>
                <span class="week-picker-trigger-text" id="week-picker-trigger-text">—</span>
                <svg class="picker-trigger-chevron" width="12" height="12" viewBox="0 0 10 6" aria-hidden="true"><path d="M1 1l4 4 4-4" stroke="currentColor" fill="none" stroke-width="1.5"/></svg>
              </button>
            </div>
          </div>
          <input type="hidden" id="filter-date-month" value="" />
          <input type="hidden" id="filter-bs-month" value="" aria-hidden="true" />
          <div class="calendar-filter-wrap" id="month-filter-wrap">
            <div class="week-picker-shell">
              <button type="button" class="week-picker-trigger" id="month-picker-trigger" aria-expanded="false" aria-haspopup="dialog" aria-controls="shared-calendar-popover" title="Select month">
                <span class="picker-trigger-icon-wrap" aria-hidden="true"><svg class="picker-trigger-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/><path d="M16 2v4M8 2v4M3 10h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span>
                <span class="week-picker-trigger-text" id="month-picker-trigger-text">—</span>
                <svg class="picker-trigger-chevron" width="12" height="12" viewBox="0 0 10 6" aria-hidden="true"><path d="M1 1l4 4 4-4" stroke="currentColor" fill="none" stroke-width="1.5"/></svg>
              </button>
            </div>
          </div>
          <input type="hidden" id="filter-date-from" value="" />
          <input type="hidden" id="filter-date-to" value="" />
          <div class="calendar-filter-wrap calendar-filter-wrap--range" id="custom-range-filter-wrap">
            <div class="week-picker-shell">
              <button type="button" class="week-picker-trigger week-picker-trigger--wide" id="range-picker-trigger" aria-expanded="false" aria-haspopup="dialog" aria-controls="shared-calendar-popover" title="Select start and end dates (click twice)">
                <span class="picker-trigger-icon-wrap" aria-hidden="true"><svg class="picker-trigger-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/><path d="M16 2v4M8 2v4M3 10h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg></span>
                <span class="week-picker-trigger-text" id="range-picker-trigger-text">—</span>
                <svg class="picker-trigger-chevron" width="12" height="12" viewBox="0 0 10 6" aria-hidden="true"><path d="M1 1l4 4 4-4" stroke="currentColor" fill="none" stroke-width="1.5"/></svg>
              </button>
            </div>
          </div>
        </div>
        <div id="shared-calendar-popover" class="calendar-popover" role="dialog" aria-modal="true" aria-label="Calendar" hidden>
          <div class="week-calendar-head">
            <button type="button" class="week-cal-nav" id="cal-prev" aria-label="Previous">‹</button>
            <span class="week-cal-title" id="cal-pop-title">—</span>
            <button type="button" class="week-cal-nav" id="cal-next" aria-label="Next">›</button>
          </div>
          <div class="week-cal-weekdays" id="cal-weekdays-row" aria-hidden="true">
            <span>Su</span><span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span>
          </div>
          <div class="week-cal-grid" id="cal-pop-body"></div>
          <div class="week-cal-footer">
            <button type="button" class="week-cal-link" id="cal-close">Close</button>
            <button type="button" class="week-cal-link week-cal-link--primary" id="cal-footer-today">Today</button>
          </div>
        </div>
        <button class="filter-drawer-toggle" id="filter-drawer-toggle" type="button" aria-label="Open filters" title="Open filters">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="7" y1="12" x2="17" y2="12"/><line x1="10" y1="18" x2="14" y2="18"/></svg>
          <span class="filter-drawer-toggle-text">Filters</span>
        </button>
        <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Switch to light mode" title="Switch to light mode">
          <span class="theme-toggle-icon" id="theme-toggle-icon" aria-hidden="true">🌙</span>
        </button>
      </div>
    </header>
    <section class="header-filter-bar" id="header-filter-bar">
      <div class="header-filter-bar-inner">
        <label class="filter-drawer-field"><span>Division</span><select class="filter-select filter-select--modern" id="filter-division"><option value="">All divisions</option></select></label>
        <label class="filter-drawer-field"><span>Region</span><select class="filter-select filter-select--modern" id="filter-region"><option value="">All regions</option></select></label>
        <label class="filter-drawer-field"><span>Cluster</span><select class="filter-select filter-select--modern" id="filter-cluster"><option value="">All clusters</option></select></label>
        <label class="filter-drawer-field"><span>Branch</span><select class="filter-select filter-select--modern" id="filter-branch"><option value="">All branches</option></select></label>
        <label class="filter-drawer-field"><span>Task Type</span><select class="filter-select filter-select--modern" id="filter-task-type"><option value="">All task types</option></select></label>
        <div class="filter-drawer-actions">
          <button type="button" class="toolbar-btn" id="filter-reset-btn">Reset</button>
        </div>
      </div>
    </section>

    <!-- Dashboard Tab -->
    <section class="tab-content active" id="tab-dashboard">
      <div class="kpi-cards" id="kpi-cards"></div>
      <div class="charts-grid" id="charts-grid">
        <div class="chart-card chart-large" id="chart-tasks-trend"><div class="chart-loader"></div></div>
        <div class="chart-card chart-large chart-card--dense" id="chart-task-type-pie"><div class="chart-loader"></div></div>
        <div class="chart-card chart-card--dense" id="chart-priority-dist"><div class="chart-loader"></div></div>
        <div class="chart-card chart-card--dense" id="chart-incident-complexity-dashboard"><div class="chart-loader"></div></div>
        <div class="chart-card chart-large" id="chart-incident-category-dashboard"><div class="chart-loader"></div></div>
        <div class="chart-card chart-large" id="chart-branch-heatmap"><div class="chart-loader"></div></div>
      </div>
    </section>

    <!-- Tasks Tab -->
    <section class="tab-content" id="tab-tasks">
      <div class="grid-toolbar" id="tasks-toolbar">
        <div class="toolbar-left">
          <input type="text" class="search-input" id="tasks-search" placeholder="Search tasks..." />
          <span class="row-count" id="tasks-row-count">0 rows</span>
        </div>
        <div class="toolbar-right">
          <button class="toolbar-btn" id="add-task-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add Row
          </button>
          <button class="toolbar-btn danger" id="delete-task-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            Delete
          </button>
        </div>
      </div>
      <div class="grid-container" id="tasks-grid"></div>
    </section>

    <!-- Incidents Tab -->
    <section class="tab-content" id="tab-incidents">
      <div class="incidents-dashboard" id="incidents-dashboard">
        <div class="kpi-cards" id="incident-kpi-cards"></div>
        <div class="charts-grid">
          <div class="chart-card chart-large" id="chart-incident-trend"><div class="chart-loader"></div></div>
          <div class="chart-card" id="chart-incident-category"><div class="chart-loader"></div></div>
          <div class="chart-card" id="chart-incident-complexity"><div class="chart-loader"></div></div>
          <div class="chart-card" id="chart-incident-closure"><div class="chart-loader"></div></div>
        </div>
      </div>
      <div class="grid-toolbar" id="incidents-toolbar">
        <div class="toolbar-left">
          <input type="text" class="search-input" id="incidents-search" placeholder="Search incidents..." />
          <span class="row-count" id="incidents-row-count">0 rows</span>
        </div>
      </div>
      <div class="grid-container" id="incidents-grid"></div>
    </section>

    <!-- Branch KPI Tab -->
    <section class="tab-content" id="tab-branch">
      <div class="branch-dashboard" id="branch-dashboard">
        <div class="charts-grid">
          <div class="chart-card chart-large" id="chart-branch-performance"><div class="chart-loader"></div></div>
          <div class="chart-card chart-large" id="chart-branch-closure-rates"><div class="chart-loader"></div></div>
          <div class="chart-card chart-large" id="chart-branch-efficiency-sheet"><div class="chart-loader"></div></div>
          <div class="chart-card" id="chart-branch-workload-sheet"><div class="chart-loader"></div></div>
          <div class="chart-card" id="chart-same-day-closure"><div class="chart-loader"></div></div>
          <div class="chart-card chart-large" id="chart-branch-tasks-volume"><div class="chart-loader"></div></div>
        </div>
      </div>
    </section>

    <!-- Support KPI Tab -->
    <section class="tab-content" id="tab-support">
      <div class="charts-grid">
        <div class="chart-card" id="chart-repeated-support-window"><div class="chart-loader"></div></div>
        <div class="chart-card" id="chart-immediate-support-window"><div class="chart-loader"></div></div>
        <div class="chart-card chart-large" id="chart-repeated-support-branch"><div class="chart-loader"></div></div>
        <div class="chart-card chart-large" id="chart-immediate-support-branch"><div class="chart-loader"></div></div>
      </div>
    </section>

    <section class="tab-content" id="tab-team">
      <div class="charts-grid">
        <div class="chart-card chart-large" id="chart-team-top-scores"><div class="chart-loader"></div></div>
        <div class="chart-card" id="chart-team-branch-performance"><div class="chart-loader"></div></div>
        <div class="chart-card" id="chart-team-ops-health"><div class="chart-loader"></div></div>
      </div>
    </section>
  </main>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>
  <div class="auth-overlay" id="auth-overlay" hidden>
    <form class="auth-card" id="auth-login-form">
      <h2>Sign in</h2>
      <p>Use your dashboard account to continue.</p>
      <label>Email
        <input type="email" id="auth-email" required />
      </label>
      <label>Password
        <input type="password" id="auth-password" required />
      </label>
      <button type="submit" class="toolbar-btn">Sign in</button>
      <div class="auth-error" id="auth-error" hidden></div>
    </form>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
