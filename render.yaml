services:
  - type: web
    name: kpi-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm run start
    plan: free
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: CORS_ORIGIN
        value: https://<your-github-pages-domain>
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false

